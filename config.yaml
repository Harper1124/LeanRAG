
glm:
  model: "bge-m3"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key_env: "DASHSCOPE_API_KEY"
  embedding_model: "bge-m3"

deepseek:

  # model: "Qwen3-14b"
  model: "qwen2.5:7b"
  # model: "Qwen3-32b"

  api_key_env: "DASHSCOPE_API_KEY"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

# Model Parameters
model_params:
  openai_embedding_dim: 1536
  glm_embedding_dim: 1024
  max_token_size: 8192

multimodal:
  enabled: true
  parser: mineru
  mineru_backend: pipeline

  max_token_size: 1024
  overlap_token_size: 128

  use_media_caption: true
  use_table_summary: true
  use_media_vector_store: true

  media_attach_topk: 3
  evidence_topk: 5
  max_images_per_query: 4
  max_tables_per_query: 4

  answer_with_vlm_when_media: true
  vlm_model: qwen2.5vl:7b
  vlm_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  vlm_api_key_env: "DASHSCOPE_API_KEY"
  vlm_api_key: ""

  embedding_dim: 1024

